<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AidVenture | Donate</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:linear-gradient(135deg,#16222A,#3A6073);
    color:white;
}
header{
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 8%;
}
header h1{color:#00f7ff;}
nav a{
    color:white;text-decoration:none;margin-left:20px;
    transition:0.3s;font-weight:500;
}
nav a:hover{color:#00f7ff;}

.section{
    padding:80px 10%;
    text-align:center;
}
.donate-box{
    max-width:500px;margin:auto;
    background:rgba(255,255,255,0.08);
    padding:40px;border-radius:20px;
    backdrop-filter:blur(10px);
}
input, select{
    width:100%;padding:12px;margin:10px 0;
    border:none;border-radius:10px;
}
.btn{
    padding:12px 30px;border:none;border-radius:30px;
    background:#00f7ff;color:#000;font-weight:600;
    cursor:pointer;transition:0.3s;margin-top:10px;
}
.btn:hover{background:white;transform:scale(1.05);}

footer{
    text-align:center;padding:20px;background:rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<header>
    <h1>AidVenture</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="features.html">Features</a>
        <a href="donate.html">Donate</a>
    </nav>
</header>

<section class="section">
    <h2>Support Disaster Relief</h2>

    <div class="donate-box">
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>

            <select required>
                <option value="">Select Donation Amount</option>
                <option>₱100</option>
                <option>₱500</option>
                <option>₱1000</option>
                <option>₱5000</option>
            </select>

            <button type="submit" class="btn">Donate Now</button>
        </form>
    </div>
</section>

<footer>
    © 2026 AidVenture | Every Mission Saves Lives
</footer>

</body>
</html>
