<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AidVenture | Home</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}
header{
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 8%;
}
header h1{color:#00f7ff;}
nav a{
    color:white;text-decoration:none;margin-left:20px;
    transition:0.3s;font-weight:500;
}
nav a:hover{color:#00f7ff;}

.hero{
    height:85vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 10%;
}
.hero h2{font-size:3rem;margin-bottom:20px;}
.hero span{color:#00f7ff;}
.hero p{max-width:700px;margin-bottom:30px;opacity:0.9;}
.btn{
    padding:12px 30px;border:none;border-radius:30px;
    background:#00f7ff;color:#000;font-weight:600;
    cursor:pointer;transition:0.3s;
}
.btn:hover{background:white;transform:scale(1.05);}

footer{
    text-align:center;padding:20px;background:rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<header>
    <h1>AidVenture</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="features.html">Features</a>
        <a href="donate.html">Donate</a>
    </nav>
</header>

<section class="hero">
    <h2>Play. Donate. <span>Save Lives.</span></h2>

    </p>
    <a href="features.html"><button class="btn">Explore Features</button></a>

<footer>
